  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
  nacos:
    image: nacos/nacos-server:v2.4.1
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
    volumes:
      - ./nacos-logs:/home/nacos/logs
      - ./nacos-data:/home/nacos/data
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"

# 说明：
# 1. 该文件仅作为本地依赖服务参考，不代表仓库已经完成完整联调。
# 2. 数据库使用 MySQL 8.0.30，初始化 SQL 脚本统一在项目 resources/sql/ 目录下管理（不通过容器自举）。
# 3. 所有容器数据均持久化到 resources/docker 目录下，便于本地统一清理和备份。
# 4. Nacos 固定使用 v2.4.1，避免 Apple Silicon / ARM64 环境下拉取 v2.3.0 失败。
# 5. MySQL 自定义配置通过 ./mysql/conf/my.cnf 挂载，首次启动前请确保该文件存在。
