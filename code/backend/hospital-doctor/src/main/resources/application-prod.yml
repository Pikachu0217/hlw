hlw:
  nacos:
    server-addr: nacos-prod:8848
    namespace: prod
    group: PROD_GROUP
    username: ${NACOS_USERNAME}
    password: ${NACOS_PASSWORD}
  datasource:
    url: jdbc:postgresql://${DOCTOR_DB_HOST}:${DOCTOR_DB_PORT:5432}/${DOCTOR_DB_NAME:hospital_doctor}
    username: ${DOCTOR_DB_USERNAME}
    password: ${DOCTOR_DB_PASSWORD}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
